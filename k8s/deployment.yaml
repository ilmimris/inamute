apiVersion: apps/v1
kind: Deployment
metadata:
  name: inamute
  namespace: inamute
  labels:
    app: inamute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inamute
  template:
    metadata:
      labels:
        app: inamute
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: inamute
          image: ghcr.io/ilmimris/inamute:78d58c8
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inamute-app-secrets
                  key: DATABASE_URL
            - name: API_KEY_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: inamute-app-secrets
                  key: API_KEY_HASH_SECRET
            - name: BIND_ADDR
              value: "0.0.0.0:8080"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
