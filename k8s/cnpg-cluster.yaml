apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: inamute-db
  namespace: cnpg-databases
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: inamute
      owner: inamute
      secret:
        name: inamute-db-credentials
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
